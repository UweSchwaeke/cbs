#
# Development only. For production images, use container/build-cbsd-rs.sh.
#
# Usage:
#   podman-compose -f podman-compose.cbsd-rs.yaml --profile dev up
#
# Config layout expected under ./_local/cbsd-rs/:
#   config/server/server.yaml    — server configuration (see cbsd-rs/config/server.yaml.example)
#   config/worker/worker.yaml    — worker configuration (see cbsd-rs/config/worker.yaml.example)
#
# Worker server-url must use the compose service name as the hostname:
#   server-url: "ws://server:8080/api/ws/worker"
#
# Note on network_mode for workers: both server and worker run on the
# default compose bridge network. If builds require access to VPN routes
# that are only visible on the host network, override network_mode for the
# worker service via a local compose override file.
#
# Dev auto-reload: the dev images use cargo-watch. The cbsd-rs/ source
# tree is bind-mounted at /cbs/src. Any change to Rust source files on the
# host triggers an incremental rebuild and restart inside the container.
# Prerequisites for dev:
#   1. Run 'cargo sqlx prepare --workspace' inside cbsd-rs/ first to
#      populate the .sqlx/ offline query cache (required by cargo build).

services:
  server-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: container/ContainerFile.cbsd-rs
      target: cbsd-rs-dev-server
    container_name: cbsd-rs-server-dev
    volumes:
      - ./_local/cbsd-rs/config/server:/cbs/config:ro
      - ./_local/cbsd-rs/data:/cbs/data:Z
      - ./_local/cbsd-rs/logs:/cbs/logs:Z
      - ./components:/cbs/components:ro
      # Rust workspace source — changes here trigger cargo-watch rebuild
      - ./cbsd-rs:/cbs/src:Z
      # Named volumes for the Cargo registry and git cache to avoid
      # re-downloading crates on every container restart
      - cbsd-rs-cargo-registry:/usr/local/cargo/registry
      - cbsd-rs-cargo-git:/usr/local/cargo/git
    security_opt:
      - label=disable
    environment:
      RUST_LOG: debug
      CBSD_DEV: "1"

  worker-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: container/ContainerFile.cbsd-rs
      target: cbsd-rs-dev-worker
    container_name: cbsd-rs-worker-dev
    privileged: true
    volumes:
      - ./_local/cbsd-rs/config/worker:/cbs/config:ro
      - ./_local/cbsd-rs/scratch:/cbs/scratch:Z
      - ./_local/cbsd-rs/scratch/containers:/var/lib/containers:Z
      - ./_local/cbsd-rs/scratch/ccache:/cbs/ccache:Z
      - ./components:/cbs/components:ro
      - /dev/fuse:/dev/fuse:rw
      # Rust workspace source — changes here trigger cargo-watch rebuild
      - ./cbsd-rs:/cbs/src:Z
      # cbscore-wrapper.py — mounted to the same path as the prod image so
      # worker.yaml.example works without modification in dev mode
      - ./cbsd-rs/scripts:/opt/cbsd-rs:ro
      - cbsd-rs-cargo-registry:/usr/local/cargo/registry
      - cbsd-rs-cargo-git:/usr/local/cargo/git
    cap_add:
      - MKNOD
      - SYS_ADMIN
    security_opt:
      - label=disable
      - seccomp=unconfined
    environment:
      RUST_LOG: debug
      CBSD_DEV: "1"
    depends_on:
      - server-dev

  ui-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: container/ContainerFile.cbsd-rs
      target: cbsd-rs-dev-ui
    container_name: cbsd-rs-ui-dev
    privileged: false
    volumes:
      - ./cbsd-rs/ui:/cbs/src:Z
      - cbsd-rs-ui-node-modules:/cbs/src/node_modules:Z
    security_opt:
      - label=disable

  caddy-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: cbsd-rs/misc/ContainerFile.caddy
    privileged: false
    ports:
      - "8080:8080"
    volumes:
      - ./cbsd-rs/misc/Caddyfile.dev:/etc/caddy/Caddyfile:ro
    security_opt:
      - label=disable
    depends_on:
      - server-dev
      - ui-dev

  # ----------------------------------------------------------------------
  # Monitoring stack (Prometheus + Grafana + server-host node-exporter).
  #
  # Per proposal 002 there are NO worker-side monitoring services: a single
  # Prometheus target (server-dev:9090) carries both the server-owned cbsd_*
  # series and the per-worker cbsd_worker_* series workers push over the
  # WebSocket. node-exporter runs beside the server only.
  #
  # The server's metrics endpoint (metrics.bind 0.0.0.0:9090 in the example
  # config) is reachable on the compose network and intentionally NOT
  # published, keeping the metrics surface off the host.
  # ----------------------------------------------------------------------
  prometheus:
    profiles: [dev]
    image: docker.io/prom/prometheus:latest
    container_name: cbsd-rs-prometheus
    volumes:
      - ./container/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - cbsd-rs-prometheus-data:/prometheus
    # Publish 9091→9090 for ad-hoc local debugging of the Prometheus UI only;
    # Grafana reaches it internally over the compose network.
    ports:
      - "9091:9090"
    security_opt:
      - label=disable
    depends_on:
      - server-dev

  grafana:
    profiles: [dev]
    image: docker.io/grafana/grafana:latest
    container_name: cbsd-rs-grafana
    volumes:
      - ./container/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./container/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - cbsd-rs-grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      # Dev convenience only — anonymous viewer access, no login wall. Do NOT
      # carry these into a production deployment.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    security_opt:
      - label=disable
    depends_on:
      - prometheus

  node-exporter:
    profiles: [dev]
    image: docker.io/prom/node-exporter:latest
    container_name: cbsd-rs-node-exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave
    security_opt:
      - label=disable

volumes:
  # Persistent Cargo registry and git caches shared across dev containers.
  # Avoids re-downloading crates on every container restart.
  cbsd-rs-cargo-registry:
  cbsd-rs-cargo-git:
  # Persistent node_modules for the UI. Avoids re-downloading on every
  # container restart.
  cbsd-rs-ui-node-modules:
  # Prometheus TSDB and Grafana state.
  cbsd-rs-prometheus-data:
  cbsd-rs-grafana-data:
