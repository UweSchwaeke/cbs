# Grafana datasource provisioning — the cbsd-rs Prometheus.
#
# Copyright (C) 2026  Clyso
#
# Provisioned (dashboards-as-code): no click-ops. The `prometheus` service is
# reachable on the compose network at its container name.

apiVersion: 1

datasources:
  - name: Prometheus
    uid: cbsd-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
